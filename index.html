<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老婆寶寶下班倒數 ♡</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.45), transparent 25%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.25), transparent 25%),
        linear-gradient(135deg, #ffd6e7 0%, #f8c8ff 45%, #d9d4ff 100%);
      color: #6b325e;
      overflow: hidden;
      position: relative;
    }

    .bubble {
      position: absolute;
      bottom: -80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      animation: floatUp linear infinite;
      pointer-events: none;
      filter: blur(1px);
    }

    .bubble::before {
      content: "♡";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.85);
    }

    .bubble:nth-child(1) { left: 8%; width: 40px; height: 40px; animation-duration: 14s; }
    .bubble:nth-child(2) { left: 20%; width: 24px; height: 24px; animation-duration: 10s; animation-delay: 2s; }
    .bubble:nth-child(3) { left: 34%; width: 52px; height: 52px; animation-duration: 16s; animation-delay: 1s; }
    .bubble:nth-child(4) { left: 52%; width: 28px; height: 28px; animation-duration: 11s; animation-delay: 3s; }
    .bubble:nth-child(5) { left: 68%; width: 44px; height: 44px; animation-duration: 15s; animation-delay: 4s; }
    .bubble:nth-child(6) { left: 84%; width: 30px; height: 30px; animation-duration: 12s; animation-delay: 1.5s; }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) scale(1.2);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 38px 24px 30px;
      width: min(92%, 720px);
      background: rgba(255, 255, 255, 0.45);
      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 30px;
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 50px rgba(165, 103, 154, 0.22);
    }

    .emoji {
      font-size: 34px;
      margin-bottom: 8px;
      animation: wiggle 2.5s infinite;
      display: inline-block;
    }

    @keyframes wiggle {
      0%, 100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(-6deg) scale(1.05); }
      50% { transform: rotate(6deg) scale(1.08); }
      75% { transform: rotate(-4deg) scale(1.04); }
    }

    .title {
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: 1px;
      color: #b14d8a;
      text-shadow: 0 4px 12px rgba(255,255,255,0.55);
    }

    .subtitle {
      font-size: 18px;
      margin-bottom: 28px;
      color: #7a4a71;
      line-height: 1.6;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .time-box {
      min-width: 128px;
      padding: 20px 16px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 24px rgba(190, 120, 170, 0.14);
    }

    .number {
      font-size: clamp(38px, 6vw, 64px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
      color: #c94f93;
    }

    .label {
      font-size: 15px;
      color: #8a5c7f;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .status {
      font-size: clamp(18px, 3.5vw, 24px);
      font-weight: 800;
      margin-top: 8px;
      color: #9c4f80;
      line-height: 1.6;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
    }

    .footer {
      margin-top: 8px;
      font-size: 14px;
      color: #9b7693;
    }

    .sparkle {
      display: inline-block;
      animation: sparkle 1.5s infinite;
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.25); opacity: 0.75; }
    }

    @media (max-width: 480px) {
      .time-box {
        min-width: 95px;
        padding: 16px 12px;
      }

      .status {
        min-height: 96px;
      }
    }
  </style>
</head>
<body>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="container">
    <div class="emoji">🎀</div>
    <div class="title">距離老婆寶寶回溫暖小窩還有</div>
    <div class="subtitle" id="targetText">馬路正在努力計算下班時刻中... <span class="sparkle">✨</span></div>

    <div class="countdown">
      <div class="time-box">
        <div class="number" id="hours">00</div>
        <div class="label">小時</div>
      </div>
      <div class="time-box">
        <div class="number" id="minutes">00</div>
        <div class="label">分鐘</div>
      </div>
      <div class="time-box">
        <div class="number" id="seconds">00</div>
        <div class="label">秒</div>
      </div>
    </div>

    <div class="status" id="status">辛苦老婆大人寶寶教授+博士</div>
    <div class="footer">Countdown to 5:00 PM · 豆塔全力倒數中</div>
  </div>

  <script>
    function getNextFivePM() {
      const now = new Date();
      const target = new Date();

      target.setHours(17, 0, 0, 0);

      if (now >= target) {
        target.setDate(target.getDate() + 1);
      }

      return target;
    }

    function formatDate(date) {
      return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")} 17:00`;
    }

    function updateCountdown() {
      const now = new Date();
      const target = getNextFivePM();
      const diff = target - now;

      const hoursEl = document.getElementById("hours");
      const minutesEl = document.getElementById("minutes");
      const secondsEl = document.getElementById("seconds");
      const targetTextEl = document.getElementById("targetText");
      const statusEl = document.getElementById("status");

      targetTextEl.innerHTML = `今日下班時間：${formatDate(target)} <span class="sparkle">💖</span>`;

      if (diff <= 0) {
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        statusEl.textContent = "恭賀老婆寶寶大人下班 👑";
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");

      if (hours === 0 && minutes < 10) {
        statusEl.textContent = "最後 10 分鐘，記得去尿尿！";
      } else if (hours === 0 && minutes < 30) {
        statusEl.textContent = "請準備收拾包包🎒";
      } else if (hours === 0) {
        statusEl.textContent = "剩不到一小時，可以包一包等下班了 ✨";
      } else {
        statusEl.textContent = "恭喜老婆寶寶大人，，離回小窩又更近一步啦 🐰";
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
