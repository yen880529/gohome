<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>下班倒數</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      background: linear-gradient(135deg, #0f172a, #1e293b, #334155);
      color: #fff;
      overflow: hidden;
    }

    .container {
      text-align: center;
      padding: 40px 24px;
      width: min(90%, 700px);
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.35);
    }

    .title {
      font-size: clamp(28px, 5vw, 48px);
      font-weight: 800;
      margin-bottom: 16px;
      letter-spacing: 2px;
    }

    .subtitle {
      font-size: 18px;
      opacity: 0.85;
      margin-bottom: 30px;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .time-box {
      min-width: 120px;
      padding: 20px 16px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.12);
      box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.05);
    }

    .number {
      font-size: clamp(36px, 6vw, 64px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
    }

    .label {
      font-size: 16px;
      opacity: 0.8;
      letter-spacing: 1px;
    }

    .status {
      font-size: 20px;
      font-weight: 600;
      margin-top: 10px;
      color: #93c5fd;
    }

    .footer {
      margin-top: 18px;
      font-size: 14px;
      opacity: 0.6;
    }

    .pulse {
      animation: pulse 1.4s infinite;
    }

    @keyframes pulse {
      0%,
      100% {
        transform: scale(1);
        text-shadow: 0 0 10px rgba(147, 197, 253, 0.25);
      }
      50% {
        transform: scale(1.05);
        text-shadow: 0 0 22px rgba(147, 197, 253, 0.8);
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="title pulse">距離回到溫暖小窩還有</div>
    <div class="subtitle" id="targetText">正在計算下班時間...</div>

    <div class="countdown">
      <div class="time-box">
        <div class="number" id="hours">00</div>
        <div class="label">小時</div>
      </div>
      <div class="time-box">
        <div class="number" id="minutes">00</div>
        <div class="label">分鐘</div>
      </div>
      <div class="time-box">
        <div class="number" id="seconds">00</div>
        <div class="label">秒</div>
      </div>
    </div>

    <div class="status" id="status">恭喜老婆寶寶大人教授+博士快下班了。</div>
    <div class="footer">Countdown to 5:00 PM</div>
  </div>

  <script>
    function getNextFivePM() {
      const now = new Date();
      const target = new Date();

      target.setHours(17, 0, 0, 0);

      if (now >= target) {
        target.setDate(target.getDate() + 1);
      }

      return target;
    }

    function formatDate(date) {
      return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")} 17:00`;
    }

    function updateCountdown() {
      const now = new Date();
      const target = getNextFivePM();
      const diff = target - now;

      const hoursEl = document.getElementById("hours");
      const minutesEl = document.getElementById("minutes");
      const secondsEl = document.getElementById("seconds");
      const targetTextEl = document.getElementById("targetText");
      const statusEl = document.getElementById("status");

      targetTextEl.textContent = `下班時間：${formatDate(target)}`;

      if (diff <= 0) {
        hoursEl.textContent = "00";
        minutesEl.textContent = "00";
        secondsEl.textContent = "00";
        statusEl.textContent = "恭喜老婆寶寶大人教授+博士下班了";
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");

      if (hours === 0 && minutes < 30) {
        statusEl.textContent = "準備回家睡覺覺老婆大人寶寶教授+博士。";
      } else if (hours === 0 && minutes < 10) {
        statusEl.textContent = "準備回家吃飯飯老婆大人寶寶教授+博士。";
      } else {
        statusEl.textContent = "恭喜老婆寶寶大人教授+博士快下班了。";
      }
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
