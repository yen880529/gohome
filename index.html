<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>老婆寶寶下班倒數 ♡</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", "Noto Sans TC", "PingFang TC", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.45), transparent 25%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.25), transparent 25%),
        linear-gradient(135deg, #ffd6e7 0%, #f8c8ff 45%, #d9d4ff 100%);
      color: #6b325e;
      overflow: hidden;
      position: relative;
    }

    .bubble {
      position: absolute;
      bottom: -80px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.28);
      animation: floatUp linear infinite;
      pointer-events: none;
      filter: blur(1px);
    }

    .bubble::before {
      content: "♡";
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      color: rgba(255, 255, 255, 0.85);
    }

    .bubble:nth-child(1) { left: 8%; width: 40px; height: 40px; animation-duration: 14s; }
    .bubble:nth-child(2) { left: 20%; width: 24px; height: 24px; animation-duration: 10s; animation-delay: 2s; }
    .bubble:nth-child(3) { left: 34%; width: 52px; height: 52px; animation-duration: 16s; animation-delay: 1s; }
    .bubble:nth-child(4) { left: 52%; width: 28px; height: 28px; animation-duration: 11s; animation-delay: 3s; }
    .bubble:nth-child(5) { left: 68%; width: 44px; height: 44px; animation-duration: 15s; animation-delay: 4s; }
    .bubble:nth-child(6) { left: 84%; width: 30px; height: 30px; animation-duration: 12s; animation-delay: 1.5s; }

    @keyframes floatUp {
      0% {
        transform: translateY(0) scale(1);
        opacity: 0;
      }
      15% {
        opacity: 1;
      }
      100% {
        transform: translateY(-120vh) scale(1.2);
        opacity: 0;
      }
    }

    .container {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 38px 24px 30px;
      width: min(92%, 720px);
      background: rgba(255, 255, 255, 0.45);
      border: 2px solid rgba(255, 255, 255, 0.55);
      border-radius: 30px;
      backdrop-filter: blur(16px);
      box-shadow: 0 18px 50px rgba(165, 103, 154, 0.22);
    }

    .main-img {
      width: 160px;
      height: 160px;
      object-fit: cover;
      border-radius: 20px;
      margin: 10px 0 18px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    .title {
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 900;
      margin-bottom: 12px;
      letter-spacing: 1px;
      color: #b14d8a;
      text-shadow: 0 4px 12px rgba(255,255,255,0.55);
    }

    .subtitle {
      font-size: 18px;
      margin-bottom: 28px;
      color: #7a4a71;
      line-height: 1.6;
    }

    .countdown {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-bottom: 24px;
    }

    .time-box {
      min-width: 128px;
      padding: 20px 16px;
      border-radius: 24px;
      background: rgba(255, 255, 255, 0.58);
      border: 1px solid rgba(255, 255, 255, 0.8);
      box-shadow: 0 10px 24px rgba(190, 120, 170, 0.14);
    }

    .number {
      font-size: clamp(38px, 6vw, 64px);
      font-weight: 900;
      line-height: 1;
      margin-bottom: 8px;
      color: #c94f93;
    }

    .label {
      font-size: 15px;
      color: #8a5c7f;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .status {
      font-size: clamp(18px, 3.5vw, 24px);
      font-weight: 800;
      margin-top: 8px;
      color: #9c4f80;
      line-height: 1.6;
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 10px;
    }

    .footer {
      margin-top: 8px;
      font-size: 14px;
      color: #9b7693;
    }

    .sparkle {
      display: inline-block;
      animation: sparkle 1.5s infinite;
    }

    @keyframes sparkle {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.25); opacity: 0.75; }
    }

    @media (max-width: 480px) {
      .time-box {
        min-width: 95px;
        padding: 16px 12px;
      }

      .status {
        min-height: 96px;
      }
    }
  </style>
</head>
<body>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>
  <div class="bubble"></div>

  <div class="container">
    <img id="mainPhoto" src="photo1.jpg" class="main-img" alt="寶寶">
    <div class="title">老婆上班無聊倒數器</div>
    <div class="subtitle" id="targetText">計算下班時間中... <span class="sparkle">✨</span></div>

    <div class="countdown">
      <div class="time-box">
        <div class="number" id="hours">00</div>
        <div class="label">小時</div>
      </div>
      <div class="time-box">
        <div class="number" id="minutes">00</div>
        <div class="label">分鐘</div>
      </div>
      <div class="time-box">
        <div class="number" id="seconds">00</div>
        <div class="label">秒</div>
      </div>
    </div>

    <div class="status" id="status">辛苦老婆大人寶寶教授+博士</div>
    <div class="footer">Countdown to 5:00 PM · 下班倒數中</div>
  </div>

<script>
  const PHOTO1 = "photo1.jpg";
  const PHOTO2 = "photo2.jpg";

  function getTodayAt(hour, minute = 0, second = 0, ms = 0) {
    const target = new Date();
    target.setHours(hour, minute, second, ms);
    return target;
  }

  function getNextWorkStart() {
    const now = new Date();
    const target = new Date();

    target.setHours(8, 0, 0, 0);

    if (now >= target) {
      target.setDate(target.getDate() + 1);
    }

    return target;
  }

  function formatDate(date) {
    return `${date.getFullYear()}/${String(date.getMonth() + 1).padStart(2, "0")}/${String(date.getDate()).padStart(2, "0")} ${String(date.getHours()).padStart(2, "0")}:${String(date.getMinutes()).padStart(2, "0")}`;
  }

  function updatePhotoByTime(now) {
    const mainPhotoEl = document.getElementById("mainPhoto");
    const switchTime = getTodayAt(16, 0, 0, 0);

    // 時間區間：
    // 00:00:00 ~ 15:59:59 顯示 photo1.jpg
    // 16:00:00 ~ 23:59:59 顯示 photo2.jpg
    if (now >= switchTime) {
      mainPhotoEl.src = PHOTO2;
    } else {
      mainPhotoEl.src = PHOTO1;
    }
  }

  function updateCountdown() {
    const now = new Date();
    const currentHours = now.getHours();
    const currentMinutes = now.getMinutes();

    updatePhotoByTime(now);

    const workStart = getTodayAt(8, 0, 0, 0);
    const lunchStart = getTodayAt(12, 0, 0, 0);
    const lunchEnd = getTodayAt(13, 0, 0, 0);
    const offWork = getTodayAt(17, 0, 0, 0);
    const nextWorkStart = getNextWorkStart();

    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const targetTextEl = document.getElementById("targetText");
    const statusEl = document.getElementById("status");

    let target = null;
    let mode = "";

    if (now >= workStart && now < lunchStart) {
      target = lunchStart;
      mode = "countdown_lunch";
    } else if (now >= lunchStart && now < lunchEnd) {
      mode = "lunch_break";
    } else if (now >= lunchEnd && now < offWork) {
      target = offWork;
      mode = "countdown_offwork";
    } else if (now >= offWork) {
      target = nextWorkStart;
      mode = "after_work_break";
    } else {
      target = workStart;
      mode = "before_work_break";
    }

    if (mode === "countdown_lunch" || mode === "countdown_offwork" || mode === "after_work_break" || mode === "before_work_break") {
      const diff = target - now;
      const totalSeconds = Math.max(0, Math.floor(diff / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");
    } else {
      hoursEl.textContent = "00";
      minutesEl.textContent = "00";
      secondsEl.textContent = "00";
    }

    if (mode === "countdown_lunch") {
      targetTextEl.innerHTML = `午餐時間：${formatDate(target)} <span class="sparkle">🍱</span>`;

      if (currentHours === 11 && currentMinutes >= 30) {
        statusEl.textContent = "🍱 快中午了～準備吃小瓜餐🐌！";
      } else {
        statusEl.textContent = "正在倒數午餐時間 ✨";
      }
      return;
    }

    if (mode === "lunch_break") {
      targetTextEl.innerHTML = `現在是午休時間 <span class="sparkle">🍱</span>`;
      statusEl.textContent = "午休時間到，午安馬卡巴卡 😴";
      return;
    }

    if (mode === "countdown_offwork") {
      targetTextEl.innerHTML = `今日下班時間：${formatDate(target)} <span class="sparkle">💖</span>`;

      const diff = target - now;
      const totalSeconds = Math.max(0, Math.floor(diff / 1000));
      const hours = Math.floor(totalSeconds / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);

      if (hours === 0 && minutes < 10) {
        statusEl.textContent = "最後 10 分鐘，記得去尿尿！";
      } else if (hours === 0 && minutes < 30) {
        statusEl.textContent = "請準備收拾包包🎒";
      } else if (hours === 0) {
        statusEl.textContent = "剩不到一小時，可以包一包等下班了 ✨";
      } else {
        statusEl.textContent = "恭喜老婆寶寶大人，離回小窩又更近一步啦 🐰";
      }
      return;
    }

    if (mode === "after_work_break") {
      targetTextEl.innerHTML = `下次上班時間：${formatDate(target)} <span class="sparkle">😴</span>`;
      statusEl.textContent = "現在是下班休息時間，晚安馬卡巴卡 😴";
      return;
    }

    if (mode === "before_work_break") {
      targetTextEl.innerHTML = `今日上班時間：${formatDate(target)} <span class="sparkle">😴</span>`;
      statusEl.textContent = "現在是上班前休息時間，請準時起床 🥱";
    }
  }

  updateCountdown();
  setInterval(updateCountdown, 1000);
</script>
</body>
</html>
